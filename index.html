<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼성생명 GFC 모집 - 당신의 성공 파트너</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .Samsung-blue { color: #034EA2; }
        .bg-Samsung-blue { background-color: #034EA2; }
        .hover-Samsung-blue:hover { background-color: #023b7a; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <nav class="fixed w-full z-50 bg-white/95 backdrop-blur-sm shadow-md transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <div class="flex-shrink-0 cursor-pointer" onclick="showPage('home')">
                    <div class="flex items-center gap-2">
                        <div class="bg-Samsung-blue text-white font-bold px-3 py-1 rounded text-lg">SAMSUNG</div>
                        <span class="font-bold text-xl text-slate-800 tracking-tight">삼성생명 GFC</span>
                    </div>
                </div>
                <div class="hidden md:flex space-x-8">
                    <button onclick="showPage('sub1')" class="text-slate-600 hover:text-Samsung-blue font-medium transition">직무 소개</button>
                    <button onclick="showPage('sub2')" class="text-slate-600 hover:text-Samsung-blue font-medium transition">급여 및 혜택</button>
                    <button onclick="showPage('sub3')" class="text-slate-600 hover:text-Samsung-blue font-medium transition">담당자 안내</button>
                    <button onclick="showPage('sub4')" class="bg-Samsung-blue text-white px-5 py-2 rounded-full font-bold hover:bg-blue-800 transition shadow-lg">지원하기</button>
                </div>
                <div class="md:hidden flex items-center">
                    <button onclick="toggleMobileMenu()" class="text-slate-600 hover:text-Samsung-blue focus:outline-none">
                        <i class="fas fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-white border-t border-slate-100">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                <button onclick="showPage('sub1'); toggleMobileMenu()" class="block w-full text-left px-3 py-2 text-slate-600 hover:bg-slate-50 hover:text-Samsung-blue font-medium">직무 소개</button>
                <button onclick="showPage('sub2'); toggleMobileMenu()" class="block w-full text-left px-3 py-2 text-slate-600 hover:bg-slate-50 hover:text-Samsung-blue font-medium">급여 및 혜택</button>
                <button onclick="showPage('sub3'); toggleMobileMenu()" class="block w-full text-left px-3 py-2 text-slate-600 hover:bg-slate-50 hover:text-Samsung-blue font-medium">담당자 안내</button>
                <button onclick="showPage('sub4'); toggleMobileMenu()" class="block w-full text-left px-3 py-2 text-Samsung-blue font-bold">지원하기</button>
            </div>
        </div>
    </nav>

    <div id="home" class="page-section pt-20">
        <section class="relative h-[600px] flex items-center justify-center overflow-hidden">
            <div class="absolute inset-0 z-0">
                <img src="https://loremflickr.com/1600/900/business,office" alt="Office Background" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-gradient-to-r from-blue-900/90 to-slate-900/70"></div>
            </div>
            <div class="relative z-10 text-center px-4 max-w-4xl mx-auto fade-in">
                <span class="inline-block py-1 px-3 rounded-full bg-blue-500/30 text-blue-100 border border-blue-400/50 text-sm font-semibold mb-4 backdrop-blur-sm">2024년 신입/경력 GFC 특별채용</span>
                <h1 class="text-4xl md:text-6xl font-black text-white mb-6 leading-tight">당신의 가치를 증명하는 곳<br><span class="text-blue-300">삼성생명 GFC</span></h1>
                <p class="text-lg md:text-xl text-slate-200 mb-10 font-light">기본급 150만원 + 성과급 = <strong class="text-white font-bold">월 500만원 이상</strong>의 안정적 고수익.<br>법인영업과 CEO컨설팅 전문가로 성장할 당신을 기다립니다.</p>
                <div class="flex flex-col sm:flex-row gap-4 justify-center">
                    <button onclick="showPage('sub4')" class="bg-white text-Samsung-blue px-8 py-4 rounded-full font-bold text-lg hover:bg-slate-100 transition shadow-xl transform hover:-translate-y-1">지금 바로 지원하기</button>
                    <button onclick="showPage('sub1')" class="bg-transparent border-2 border-white text-white px-8 py-4 rounded-full font-bold text-lg hover:bg-white/10 transition">직무 자세히 보기</button>
                </div>
            </div>
        </section>
        </div>

    <div id="sub4" class="page-section hidden pt-24 min-h-screen pb-20 fade-in">
        <div class="max-w-2xl mx-auto px-4">
            <button onclick="showPage('home')" class="mb-8 text-slate-500 hover:text-Samsung-blue font-medium flex items-center gap-2">
                <i class="fas fa-arrow-left"></i> 메인으로 돌아가기
            </button>
            
            <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
                <div class="bg-Samsung-blue p-8 text-center">
                    <h2 class="text-3xl font-bold text-white mb-2">입사 지원하기</h2>
                    <p class="text-blue-200">간단한 정보를 남겨주시면 김훈 담당자가 직접 연락드립니다.</p>
                </div>
                
                <div class="p-8 md:p-12">
                    <form id="my-form" action="https://formspree.io/f/xjgepopj" method="POST" class="space-y-6">
                        <div>
                            <label for="name" class="block text-sm font-medium text-slate-700 mb-1">이름</label>
                            <input type="text" name="name" id="name" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-Samsung-blue focus:border-transparent outline-none transition" placeholder="홍길동">
                        </div>
                        
                        <div>
                            <label for="phone" class="block text-sm font-medium text-slate-700 mb-1">연락처</label>
                            <input type="tel" name="phone" id="phone" required class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-Samsung-blue focus:border-transparent outline-none transition" placeholder="010-0000-0000">
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label for="age" class="block text-sm font-medium text-slate-700 mb-1">나이</label>
                                <input type="number" name="age" id="age" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-Samsung-blue focus:border-transparent outline-none transition" placeholder="만 나이">
                            </div>
                            <div>
                                <label for="career" class="block text-sm font-medium text-slate-700 mb-1">경력사항</label>
                                <select name="career" id="career" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-Samsung-blue focus:border-transparent outline-none transition bg-white">
                                    <option value="new">신입</option>
                                    <option value="experienced">경력 (1~3년)</option>
                                    <option value="expert">경력 (3년 이상)</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label for="message" class="block text-sm font-medium text-slate-700 mb-1">문의사항 (선택)</label>
                            <textarea name="message" id="message" rows="4" class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:ring-2 focus:ring-Samsung-blue focus:border-transparent outline-none transition" placeholder="궁금하신 점이나 면접 희망 일정을 적어주세요."></textarea>
                        </div>

                        <button type="submit" id="submit-btn" class="w-full bg-Samsung-blue text-white font-bold py-4 rounded-lg text-lg hover:bg-blue-800 transition shadow-lg transform active:scale-95">
                            지원서 제출하기
                        </button>
                        
                        <p id="form-status" class="text-center font-medium mt-4 hidden"></p>

                        <p class="text-xs text-center text-slate-400 mt-4">
                            제출해주신 개인정보는 채용 상담 목적으로만 사용됩니다.
                        </p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        // SPA Navigation Logic
        function showPage(pageId) {
            const sections = document.querySelectorAll('.page-section');
            sections.forEach(section => {
                section.classList.add('hidden');
            });

            const target = document.getElementById(pageId);
            if (target) {
                target.classList.remove('hidden');
                window.scrollTo(0, 0);
            }
        }

        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('hidden');
        }

        // --- 수정된 AJAX 제출 스크립트 ---
        const form = document.getElementById("my-form");
        
        async function handleSubmit(event) {
            event.preventDefault(); // 페이지 이동 방지
            const status = document.getElementById("form-status");
            const btn = document.getElementById("submit-btn");
            const data = new FormData(event.target);

            // 버튼 비활성화 (중복 클릭 방지)
            btn.disabled = true;
            btn.innerText = "전송 중...";

            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: {
                    'Accept': 'application/json'
                }
            }).then(response => {
                if (response.ok) {
                    // 성공 시
                    status.classList.remove('hidden', 'text-red-500');
                    status.classList.add('text-green-600');
                    status.innerHTML = "✅ 지원서가 성공적으로 제출되었습니다. 곧 연락드리겠습니다!";
                    form.reset(); // 폼 초기화
                } else {
                    // 에러 시
                    response.json().then(data => {
                        if (Object.hasOwn(data, 'errors')) {
                            status.innerHTML = data["errors"].map(error => error["message"]).join(", ");
                        } else {
                            status.innerHTML = "❌ 제출 중 오류가 발생했습니다. 다시 시도해주세요.";
                        }
                    });
                    status.classList.remove('hidden');
                    status.classList.add('text-red-500');
                }
            }).catch(error => {
                // 네트워크 에러 등
                status.classList.remove('hidden');
                status.classList.add('text-red-500');
                status.innerHTML = "❌ 서버와 연결할 수 없습니다. 인터넷 연결을 확인하세요.";
            }).finally(() => {
                // 버튼 복구
                btn.disabled = false;
                btn.innerText = "지원서 제출하기";
            });
        }
        
        form.addEventListener("submit", handleSubmit);

        document.addEventListener('DOMContentLoaded', () => {
            showPage('home');
        });
    </script>
</body>
</html>
